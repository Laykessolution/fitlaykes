document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n            <div style=\"flex:1; background:{{ surface }}; border-radius:14px; padding:14px; text-align:center\">\n              <div style=\"font-size:26px; font-weight:800; letter-spacing:-1px\">{{ totalVolumeK }}<\u002Fdiv>\n              <div style=\"font-size:10px; font-weight:700; color:{{ textSecondary }}; margin-top:3px; text-transform:uppercase; letter-spacing:0.05em\">Volume<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Theme -->\n          <div style=\"margin-bottom:24px\">\n            <div style=\"font-size:11px; font-weight:700; color:{{ textSecondary }}; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px\">🎨 Tema<\u002Fdiv>\n            <div style=\"display:flex; gap:8px\">\n              <sc-for list=\"{{ themeOptions }}\" as=\"th\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ th.onSelect }}\" style=\"{{ th.style }}\">{{ th.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Edit -->\n          <div style=\"font-size:11px; font-weight:700; color:{{ textSecondary }}; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:12px\">⚙️ Perfil<\u002Fdiv>\n          <div style=\"background:{{ surface }}; border-radius:14px; overflow:hidden\">\n            <div style=\"padding:14px 16px; border-bottom:1px solid {{ borderColor }}; display:flex; align-items:center\">\n              <div style=\"flex:1; font-size:14px; font-weight:600; color:{{ textSecondary }}\">Nome<\u002Fdiv>\n              <input value=\"{{ userName }}\" oninput=\"{{ onNameChange }}\" style=\"background:transparent; border:none; font-family:inherit; font-size:14px; font-weight:600; color:{{ textPrimary }}; text-align:right; outline:none; width:180px\">\n            <\u002Fdiv>\n            <div style=\"padding:14px 16px; display:flex; align-items:center\">\n              <div style=\"flex:1; font-size:14px; font-weight:600; color:{{ textSecondary }}\">Objetivo<\u002Fdiv>\n              <input value=\"{{ userGoal }}\" oninput=\"{{ onGoalChange }}\" style=\"background:transparent; border:none; font-family:inherit; font-size:14px; font-weight:600; color:{{ textPrimary }}; text-align:right; outline:none; width:180px\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n\n    <!-- ══════════════ BOTTOM NAV ══════════════ -->\n    <sc-if value=\"{{ showBottomNav }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:{{ navBg }}; border-top:1px solid {{ borderColor }}; z-index:50; padding:8px 16px 12px\">\n        <div style=\"display:flex\">\n          <sc-for list=\"{{ navItems }}\" as=\"nav\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ nav.onClick }}\" style=\"{{ nav.style }}\">\n              <div style=\"font-size:20px; line-height:1\">{{ nav.icon }}<\u002Fdiv>\n              <div style=\"font-size:10px; font-weight:700; margin-top:3px; letter-spacing:0.02em\">{{ nav.label }}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:430,&quot;height&quot;:844}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    theme: (() => { try { return localStorage.getItem('fit_theme') || 'dark'; } catch(e) { return 'dark'; } })(),\n    reportStyle: 'dark',\n    profile: {\n      name: (() => { try { return localStorage.getItem('fit_name') || 'Atleta'; } catch(e) { return 'Atleta'; } })(),\n      goal: (() => { try { return localStorage.getItem('fit_goal') || 'Hipertrofia'; } catch(e) { return 'Hipertrofia'; } })(),\n    },\n    activeWorkout: null,\n    currentExerciseIdx: 0,\n    workoutElapsedStr: '00:00',\n    showTimer: false,\n    timerTotalSeconds: 90,\n    timerElapsed: 0,\n    timerActive: false,\n    historyMonth: new Date().getMonth(),\n    historyYear: new Date().getFullYear(),\n    workoutLogs: (() => { try { return JSON.parse(localStorage.getItem('fit_logs') || '[]'); } catch(e) { return []; } })(),\n    lastFinishedLog: null,\n    showExercisePicker: false,\n    pickerMode: 'workout', // 'workout' | 'builder'\n    exerciseSearch: '',\n    exerciseGroupFilter: 'Todos',\n    // Builder\n    builderName: '',\n    builderExercises: [], // [{id, name, group}]\n    // New exercise form\n    showNewExerciseForm: false,\n    newExerciseName: '',\n    newExerciseGroup: 'Peito',\n    customExercises: (() => { try { return JSON.parse(localStorage.getItem('fit_custom_ex') || '[]'); } catch(e) { return []; } })(),\n  };\n\n  _timerInterval = null;\n  _workoutInterval = null;\n\n  componentWillUnmount() {\n    clearInterval(this._timerInterval);\n    clearInterval(this._workoutInterval);\n  }\n\n  getTheme() {\n    const themes = {\n      dark: {\n        bg: '#0e0e11', surface: '#18181c', navBg: '#18181c',\n        accent: '#FF3B5C', accentSoft: 'rgba(255,59,92,0.12)',\n        successColor: '#22c55e',\n        textPrimary: '#f0f0f4', textSecondary: '#6b6b8a',\n        borderColor: '#252530', bgDeepest: '#0a0a0d',\n      },\n      neon: {\n        bg: '#080810', surface: '#12121e', navBg: '#12121e',\n        accent: '#00ff94', accentSoft: 'rgba(0,255,148,0.1)',\n        successColor: '#00c8e0',\n        textPrimary: '#e0e4ff', textSecondary: '#454580',\n        borderColor: '#1c1c32', bgDeepest: '#050509',\n      },\n      light: {\n        bg: '#f5f5f8', surface: '#ffffff', navBg: '#ffffff',\n        accent: '#FF3B5C', accentSoft: 'rgba(255,59,92,0.08)',\n        successColor: '#16a34a',\n        textPrimary: '#18181c', textSecondary: '#8a8a9a',\n        borderColor: '#e8e8ef', bgDeepest: '#ebebf0',\n      },\n    };\n    return themes[this.state.theme] || themes.dark;\n  }\n\n  getExerciseDB() {\n    return {\n      'supino-reto':        { name: 'Supino Reto',       group: 'Peito' },\n      'supino-inclinado':   { name: 'Supino Inclinado',  group: 'Peito' },\n      'supino-declinado':   { name: 'Supino Declinado',  group: 'Peito' },\n      'crucifixo':          { name: 'Crucifixo',         group: 'Peito' },\n      'crossover':          { name: 'Cross-Over',        group: 'Peito' },\n      'flexao':             { name: 'Flexão',            group: 'Peito' },\n      'puxada-frontal':     { name: 'Puxada Frontal',    group: 'Costas' },\n      'puxada-aberta':      { name: 'Puxada Aberta',     group: 'Costas' },\n      'remada-curvada':     { name: 'Remada Curvada',    group: 'Costas' },\n      'remada-unilateral':  { name: 'Remada Unilateral', group: 'Costas' },\n      'terra':              { name: 'Levant. Terra',     group: 'Costas' },\n      'serrote':            { name: 'Serrote',           group: 'Costas' },\n      'desenvolvimento':    { name: 'Desenvolvimento',   group: 'Ombro' },\n      'elevacao-lateral':   { name: 'Elev. Lateral',     group: 'Ombro' },\n      'elevacao-frontal':   { name: 'Elev. Frontal',     group: 'Ombro' },\n      'remada-alta':        { name: 'Remada Alta',        group: 'Ombro' },\n      'face-pull':          { name: 'Face Pull',          group: 'Ombro' },\n      'rosca-direta':       { name: 'Rosca Direta',       group: 'Bíceps' },\n      'rosca-alternada':    { name: 'Rosca Alternada',    group: 'Bíceps' },\n      'rosca-martelo':      { name: 'Rosca Martelo',      group: 'Bíceps' },\n      'rosca-concentrada':  { name: 'Rosca Concentrada',  group: 'Bíceps' },\n      'triceps-pulley':     { name: 'Tríceps Pulley',    group: 'Tríceps' },\n      'triceps-frances':    { name: 'Tríceps Francês',   group: 'Tríceps' },\n      'mergulho':           { name: 'Mergulho',           group: 'Tríceps' },\n      'triceps-coice':      { name: 'Tríceps Coice',     group: 'Tríceps' },\n      'agachamento':        { name: 'Agachamento',        group: 'Perna' },\n      'leg-press':          { name: 'Leg Press',          group: 'Perna' },\n      'hack-squat':         { name: 'Hack Squat',         group: 'Perna' },\n      'extensora':          { name: 'Cad. Extensora',    group: 'Perna' },\n      'flexora':            { name: 'Mesa Flexora',       group: 'Perna' },\n      'panturrilha':        { name: 'Panturrilha',        group: 'Perna' },\n      'stiff':              { name: 'Stiff',              group: 'Perna' },\n      'abdominal':          { name: 'Abdominal',          group: 'Abdômen' },\n      'prancha':            { name: 'Prancha',            group: 'Abdômen' },\n      'elevacao-pernas':    { name: 'Elev. de Pernas',   group: 'Abdômen' },\n      'crunch':             { name: 'Crunch',             group: 'Abdômen' },\n      'esteira':            { name: 'Esteira',            group: 'Cardio' },\n      'bike':               { name: 'Bike',               group: 'Cardio' },\n      'eliptico':           { name: 'Elíptico',           group: 'Cardio' },\n      'hiit':               { name: 'HIIT',               group: 'Cardio' },\n    };\n  }\n\n  buildExercises(rawList) {\n    const db = this.getExerciseDB();\n    return rawList.map(({ id, sets, reps }) => {\n      const info = db[id] || { name: id, group: '' };\n      let lastWeight = '';\n      for (const log of this.state.workoutLogs) {\n        if (!log.exercises) continue;\n        const ex = log.exercises.find(e => e.id === id);\n        if (ex && ex.sets && ex.sets.length > 0 && ex.sets[0].weight) { lastWeight = ex.sets[0].weight; break; }\n      }\n      return {\n        id, name: info.name, group: info.group,\n        sets: Array.from({ length: sets }, () => ({ reps: reps.toString(), weight: lastWeight, done: false })),\n      };\n    });\n  }\n\n  getWorkoutTemplates() {\n    return [\n      { id:'treino-a', name:'Treino A', focus:'Peito + Tríceps', color:'#FF3B5C', initial:'A',\n        exercises:[{id:'supino-reto',sets:4,reps:12},{id:'supino-inclinado',sets:3,reps:12},{id:'crucifixo',sets:3,reps:15},{id:'triceps-pulley',sets:4,reps:12},{id:'triceps-frances',sets:3,reps:12}] },\n      { id:'treino-b', name:'Treino B', focus:'Costas + Bíceps', color:'#3B82F6', initial:'B',\n        exercises:[{id:'puxada-frontal',sets:4,reps:12},{id:'remada-curvada',sets:4,reps:10},{id:'remada-unilateral',sets:3,reps:12},{id:'rosca-direta',sets:4,reps:12},{id:'rosca-martelo',sets:3,reps:12}] },\n      { id:'treino-c', name:'Treino C', focus:'Pernas', color:'#22c55e', initial:'C',\n        exercises:[{id:'agachamento',sets:4,reps:10},{id:'leg-press',sets:4,reps:12},{id:'extensora',sets:3,reps:15},{id:'flexora',sets:3,reps:15},{id:'panturrilha',sets:4,reps:20}] },\n      { id:'treino-d', name:'Treino D', focus:'Ombro + Abdômen', color:'#a855f7', initial:'D',\n        exercises:[{id:'desenvolvimento',sets:4,reps:12},{id:'elevacao-lateral',sets:4,reps:15},{id:'elevacao-frontal',sets:3,reps:15},{id:'abdominal',sets:4,reps:20},{id:'prancha',sets:3,reps:30}] },\n      { id:'push', name:'Push', focus:'Peito + Ombro + Tríceps', color:'#f97316', initial:'P',\n        exercises:[{id:'supino-reto',sets:4,reps:10},{id:'supino-inclinado',sets:3,reps:12},{id:'desenvolvimento',sets:4,reps:12},{id:'elevacao-lateral',sets:3,reps:15},{id:'triceps-pulley',sets:3,reps:12}] },\n      { id:'pull', name:'Pull', focus:'Costas + Bíceps', color:'#06b6d4', initial:'P',\n        exercises:[{id:'puxada-frontal',sets:4,reps:12},{id:'remada-curvada',sets:4,reps:10},{id:'terra',sets:3,reps:8},{id:'rosca-direta',sets:4,reps:12},{id:'rosca-martelo',sets:3,reps:12}] },\n      { id:'legs', name:'Legs', focus:'Pernas completo', color:'#10b981', initial:'L',\n        exercises:[{id:'agachamento',sets:5,reps:8},{id:'leg-press',sets:4,reps:12},{id:'hack-squat',sets:3,reps:12},{id:'extensora',sets:3,reps:15},{id:'flexora',sets:3,reps:15},{id:'panturrilha',sets:4,reps:20}] },\n      { id:'full-body', name:'Full Body', focus:'Corpo completo', color:'#eab308', initial:'F',\n        exercises:[{id:'agachamento',sets:3,reps:10},{id:'supino-reto',sets:3,reps:10},{id:'terra',sets:3,reps:8},{id:'desenvolvimento',sets:3,reps:12},{id:'rosca-direta',sets:3,reps:12}] },\n    ];\n  }\n\n  startWorkout(template) {\n    const exercises = this.buildExercises(template.exercises);\n    const startTime = Date.now();\n    const workout = { id:template.id, name:template.name, focus:template.focus, color:template.color, startTime, exercises };\n    clearInterval(this._workoutInterval);\n    this._workoutInterval = setInterval(() => {\n      const elapsed = Math.floor((Date.now() - startTime) / 1000);\n      this.setState({ workoutElapsedStr: `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${(elapsed%60).toString().padStart(2,'0')}` });\n    }, 1000);\n    this.setState({ activeWorkout: workout, currentExerciseIdx: 0, workoutElapsedStr: '00:00', screen: 'active' });\n  }\n\n  updateSet(exIdx, setIdx, field, value) {\n    const wk = { ...this.state.activeWorkout };\n    wk.exercises = wk.exercises.map((e, ei) =>\n      ei !== exIdx ? e : { ...e, sets: e.sets.map((s, si) => si !== setIdx ? s : { ...s, [field]: value }) }\n    );\n    this.setState({ activeWorkout: wk });\n  }\n\n  toggleSet(exIdx, setIdx) {\n    const wasUndone = !this.state.activeWorkout.exercises[exIdx].sets[setIdx].done;\n    const wk = { ...this.state.activeWorkout };\n    wk.exercises = wk.exercises.map((e, ei) =>\n      ei !== exIdx ? e : { ...e, sets: e.sets.map((s, si) => si !== setIdx ? s : { ...s, done: !s.done }) }\n    );\n    this.setState({ activeWorkout: wk, showTimer: wasUndone ? true : this.state.showTimer });\n  }\n\n  addSet() {\n    const exIdx = this.state.currentExerciseIdx;\n    const ex = this.state.activeWorkout.exercises[exIdx];\n    const last = ex.sets[ex.sets.length - 1] || {};\n    const wk = { ...this.state.activeWorkout };\n    wk.exercises = wk.exercises.map((e, ei) =>\n      ei !== exIdx ? e : { ...e, sets: [...e.sets, { reps: last.reps||'', weight: last.weight||'', done: false }] }\n    );\n    this.setState({ activeWorkout: wk });\n  }\n\n  prevExercise() { const i = this.state.currentExerciseIdx; if (i > 0) this.setState({ currentExerciseIdx: i - 1 }); }\n  nextExercise() {\n    const i = this.state.currentExerciseIdx;\n    const max = (this.state.activeWorkout?.exercises?.length || 1) - 1;\n    if (i < max) this.setState({ currentExerciseIdx: i + 1 });\n  }\n\n  finishWorkout() {\n    clearInterval(this._workoutInterval);\n    const wk = this.state.activeWorkout;\n    if (!wk) { this.setState({ screen: 'home' }); return; }\n    const duration = Math.floor((Date.now() - wk.startTime) / 1000);\n    const durationStr = duration % 60 > 0 ? `${Math.floor(duration/60)}m ${duration%60}s` : `${Math.floor(duration/60)}m`;\n    let totalVolume = 0, totalSets = 0;\n    wk.exercises.forEach(ex => ex.sets.forEach(s => {\n      if (s.done) { totalVolume += (parseFloat(s.weight)||0) * (parseInt(s.reps)||0); totalSets++; }\n    }));\n    const log = {\n      id: Date.now().toString(), date: new Date().toISOString().split('T')[0],\n      workoutId: wk.id, name: wk.name, focus: wk.focus, color: wk.color,\n      duration: durationStr, durationSeconds: duration,\n      volume: Math.round(totalVolume), sets: totalSets,\n      exercises: wk.exercises.map(e => ({ id:e.id, name:e.name, sets:e.sets.filter(s=>s.done).map(s=>({reps:s.reps,weight:s.weight})) })),\n    };\n    const logs = [log, ...this.state.workoutLogs];\n    try { localStorage.setItem('fit_logs', JSON.stringify(logs)); } catch(e) {}\n    this.setState({ workoutLogs: logs, lastFinishedLog: log, activeWorkout: null, screen: 'finish' });\n  }\n\n  confirmFinish() { this.finishWorkout(); }\n\n  // ── EXERCISE PICKER ──────────────────────────────────────────────────\n  openExercisePicker() {\n    this.setState({ showExercisePicker: true, pickerMode: 'workout', exerciseSearch: '', exerciseGroupFilter: 'Todos' });\n  }\n  openBuilderPicker() {\n    this.setState({ showExercisePicker: true, pickerMode: 'builder', exerciseSearch: '', exerciseGroupFilter: 'Todos' });\n  }\n  closeExercisePicker() {\n    this.setState({ showExercisePicker: false });\n  }\n\n  getAllExercises() {\n    const db = this.getExerciseDB();\n    const custom = this.state.customExercises || [];\n    const all = { ...db };\n    custom.forEach(ex => { all[ex.id] = { name: ex.name, group: ex.group }; });\n    return all;\n  }\n\n  addExerciseFromPicker(exerciseId) {\n    const all = this.getAllExercises();\n    const info = all[exerciseId];\n    if (!info) return;\n\n    if (this.state.pickerMode === 'builder') {\n      const already = this.state.builderExercises.find(e => e.id === exerciseId);\n      if (!already) {\n        this.setState({ builderExercises: [...this.state.builderExercises, { id: exerciseId, name: info.name, group: info.group }] });\n      }\n      return; // stay on picker so user can keep adding\n    }\n\n    // mode = 'workout'\n    if (!this.state.activeWorkout) { this.closeExercisePicker(); return; }\n    let lastWeight = '';\n    for (const log of this.state.workoutLogs) {\n      if (!log.exercises) continue;\n      const ex = log.exercises.find(e => e.id === exerciseId);\n      if (ex && ex.sets && ex.sets[0] && ex.sets[0].weight) { lastWeight = ex.sets[0].weight; break; }\n    }\n    const newEx = { id: exerciseId, name: info.name, group: info.group, sets: [{ reps: '12', weight: lastWeight, done: false }] };\n    const wk = { ...this.state.activeWorkout, exercises: [...this.state.activeWorkout.exercises, newEx] };\n    this.setState({ activeWorkout: wk, currentExerciseIdx: wk.exercises.length - 1, showExercisePicker: false });\n  }\n\n  // ── BUILDER ───────────────────────────────────────────────────────────\n  openBuilder() {\n    this.setState({ screen: 'builder', builderName: '', builderExercises: [] });\n  }\n\n  removeBuilderExercise(id) {\n    this.setState({ builderExercises: this.state.builderExercises.filter(e => e.id !== id) });\n  }\n\n  startBuilderWorkout() {\n    const { builderName, builderExercises } = this.state;\n    if (!builderName.trim()) { alert('Dê um nome ao treino!'); return; }\n    if (builderExercises.length === 0) { alert('Adicione pelo menos 1 exercício!'); return; }\n    const template = {\n      id: 'custom-' + Date.now(),\n      name: builderName.trim(),\n      focus: builderExercises.slice(0,3).map(e => e.group).filter((g,i,a) => a.indexOf(g) === i).join(' + '),\n      color: '#FF3B5C',\n      exercises: builderExercises.map(e => ({ id: e.id, sets: 3, reps: 12 })),\n    };\n    this.startWorkout(template);\n  }\n\n  // ── NEW EXERCISE FORM ────────────────────────────────────────────────\n  openNewExerciseForm() {\n    this.setState({ showNewExerciseForm: true, newExerciseName: '', newExerciseGroup: 'Peito' });\n  }\n  closeNewExerciseForm() { this.setState({ showNewExerciseForm: false }); }\n\n  saveNewExercise() {\n    const name = this.state.newExerciseName.trim();\n    if (!name) { alert('Digite o nome do exercício!'); return; }\n    const id = 'custom-' + Date.now();\n    const newEx = { id, name, group: this.state.newExerciseGroup };\n    const updated = [...(this.state.customExercises || []), newEx];\n    try { localStorage.setItem('fit_custom_ex', JSON.stringify(updated)); } catch(e) {}\n    this.setState({ customExercises: updated, showNewExerciseForm: false });\n  }\n\n  getPreviousRecord(exerciseId) {\n    for (const log of this.state.workoutLogs) {\n      if (!log.exercises) continue;\n      const ex = log.exercises.find(e => e.id === exerciseId);\n      if (ex && ex.sets && ex.sets.length > 0) {\n        const best = ex.sets.reduce((b, s) => (parseFloat(s.weight)||0) > (parseFloat(b.weight)||0) ? s : b, ex.sets[0]);\n        if (best.weight) return `${best.weight}kg × ${best.reps} reps`;\n      }\n    }\n    return 'Sem registro';\n  }\n\n  toggleTimer() { this.setState(s => ({ showTimer: !s.showTimer })); }\n  closeTimer() { this.setState({ showTimer: false }); }\n\n  startStopTimer() {\n    if (this.state.timerActive) {\n      clearInterval(this._timerInterval);\n      this.setState({ timerActive: false });\n    } else {\n      const startAt = Date.now(), startElapsed = this.state.timerElapsed;\n      this._timerInterval = setInterval(() => {\n        const elapsed = startElapsed + Math.floor((Date.now() - startAt) / 1000);\n        if (elapsed >= this.state.timerTotalSeconds) {\n          clearInterval(this._timerInterval);\n          this.setState({ timerElapsed: this.state.timerTotalSeconds, timerActive: false });\n        } else { this.setState({ timerElapsed: elapsed }); }\n      }, 250);\n      this.setState({ timerActive: true });\n    }\n  }\n\n  resetTimer() { clearInterval(this._timerInterval); this.setState({ timerElapsed: 0, timerActive: false }); }\n  setTimerPreset(s) { clearInterval(this._timerInterval); this.setState({ timerTotalSeconds: s, timerElapsed: 0, timerActive: false }); }\n  formatTime(secs) {\n    secs = Math.max(0, secs);\n    return `${Math.floor(secs/60).toString().padStart(2,'0')}:${(secs%60).toString().padStart(2,'0')}`;\n  }\n\n  getCalendarCells() {\n    const { historyMonth: hm, historyYear: hy, workoutLogs } = this.state;\n    const t = this.getTheme();\n    const today = new Date();\n    const firstDay = new Date(hy, hm, 1).getDay();\n    const daysInMonth = new Date(hy, hm + 1, 0).getDate();\n    const logDates = new Set(workoutLogs.filter(l => {\n      const d = new Date(l.date + 'T12:00');\n      return d.getMonth() === hm && d.getFullYear() === hy;\n    }).map(l => parseInt(l.date.split('-')[2])));\n    const cells = [];\n    for (let i = 0; i < firstDay; i++) cells.push({ day: '', style: { height: '34px' } });\n    for (let d = 1; d <= daysInMonth; d++) {\n      const isToday = d === today.getDate() && hm === today.getMonth() && hy === today.getFullYear();\n      const trained = logDates.has(d);\n      cells.push({\n        da imer(),\n      resetTimer: () => this.resetTimer(),\n\n      finishSummary: lastLog ? `${lastLog.name} — ${lastLog.focus}` : '',\n      summaryDuration: lastLog?.duration || '—',\n      summaryVolume: lastLog ? `${lastLog.volume}kg` : '—',\n      summarySets: lastLog?.sets ?? '—',\n\n      reportCardStyle,\n      reportWorkoutName: report?.workoutName || '—',\n      reportDate: report?.date || '—',\n      reportTime: report?.time || '—',\n      reportExercises: report?.exercises || [],\n      reportVolume: report?.volume || '0',\n      reportDuration: report?.duration || '—',\n      reportSets: report?.sets || '0',\n      reportStyles,\n\n      calendarMonthLabel: `${monthNames[s.historyMonth]} ${s.historyYear}`,\n      dayLabels: ['D','S','T','Q','Q','S','S'],\n      calendarCells: this.getCalendarCells(),\n      prevMonth: () => this.setState(st => ({\n        historyMonth: st.historyMonth === 0 ? 11 : st.historyMonth - 1,\n        historyYear: st.historyMonth === 0 ? st.historyYear - 1 : st.historyYear,\n      })),\n      nextMonth: () => this.setState(st => ({\n        historyMonth: st.historyMonth === 11 ? 0 : st.historyMonth + 1,\n        historyYear: st.historyMonth === 11 ? st.historyYear + 1 : st.historyYear,\n      })),\n      hasWorkoutLogs: s.workoutLogs.length > 0,\n      noWorkoutLogs: s.workoutLogs.length === 0,\n      recentLogs,\n\n      themeOptions,\n      onNameChange: (e) => {\n        const name = e.target.value;\n        this.setState(st => ({ profile: { ...st.profile, name } }));\n        try { localStorage.setItem('fit_name', name); } catch(err) {}\n      },\n      onGoalChange: (e) => {\n        const goal = e.target.value;\n        this.setState(st => ({ profile: { ...st.profile, goal } }));\n        try { localStorage.setItem('fit_goal', goal); } catch(err) {}\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
